version: 1

device:
  brightness_percent: 20
  heartbeat_timeout_ms: 3000
  current_limit_ma: 300
  battery_display_mode: on_change
  preferred_transports:
    - usb_vendor_hid
    - ble_gatt

controls:
  key_11:
    action: push_to_talk
    activation: hold
    max_hold_ms: 60000

safety:
  approve:
    required_state: waiting_approval
    gesture: long
    minimum_hold_ms: 900
  reject:
    required_state: waiting_approval
    gesture: double
  interrupt:
    required_state: running
    gesture: long
    minimum_hold_ms: 700
  push:
    gesture: chord
    require_second_confirmation: true
  deploy:
    gesture: chord
    require_second_confirmation: true
  delete:
    gesture: chord
    require_second_confirmation: true
  new_task:
    gesture: long
    minimum_hold_ms: 500
  run_tests:
    gesture: short
  open_diff:
    gesture: short
  set_reasoning_level:
    gesture: short

state_colors:
  idle: "#202020"
  running: "#2D7FF9"
  waiting_approval: "#FFB000"
  waiting_input: "#8E5CFF"
  completed: "#20B26B"
  failed: "#E5484D"
  disconnected: "#606060"

audit:
  # Keep real audit logs outside the repository.
  path: null
